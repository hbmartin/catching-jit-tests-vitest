name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.13'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest
        run: |
          npm -v
          npm config set prefix ~/.local
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          npm install -g npm@latest
          hash -r
          npm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        run: pnpm run release:check-version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Verify build artifacts
        run: pnpm run release:verify-artifacts

      - name: Verify packaged CLI
        run: pnpm run release:verify-cli

      - name: Verify packed package
        run: npm pack --dry-run

      - name: Lint package exports
        run: pnpm run publint

      - name: Publish to npm
        run: |
          TAG="latest"
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            TAG="next"
          fi

          echo "Publishing with tag: $TAG"
          npm publish --tag "$TAG" --access public --provenance
